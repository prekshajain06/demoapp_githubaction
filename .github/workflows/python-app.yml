# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python CI

on: #provide events that triggers the workflow
  push: #the event that triggers the workflow when code is pushed to the repository
    branches: 
        - main
  pull_request:
    branches: 
        - main

jobs: #define the jobs that will run when the workflow is triggered
  test: #the name of the job

    runs-on: ubuntu-latest #the type of runner, here the container where the entire appln will be run and tested

    steps:  # workflow steps that will be executed as part of the job
    # Step 1: Check out the repository code
    - name: Check out code
      uses: actions/checkout@v4  # pre-built action defined by Github Actions to check out the code from the repository

    # Step 2: Set up Python environment
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    # Step 3: Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    # Step 4: Run tests using pytest
    - name: Test with pytest
      run: |
        pytest
